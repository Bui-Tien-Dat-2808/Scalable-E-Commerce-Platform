apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.16
          ports:
            - containerPort: 8500
              name: http
            - containerPort: 8600
              name: dns-udp
              protocol: UDP
          command:
            - "consul"
            - "agent"
            - "-dev"
            - "-client=0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: consul-service
spec:
  ports:
    - name: http
      port: 8500
      targetPort: 8500
    - name: dns-udp
      port: 8600
      targetPort: 8600
      protocol: UDP
  selector:
    app: consul
