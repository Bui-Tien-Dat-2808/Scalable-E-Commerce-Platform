version: "3.9"
services:
  consul:
    image: hashicorp/consul:1.16
    container_name: ecom-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: "agent -dev -client=0.0.0.0"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      - POSTGRES_MULTIPLE_DATABASES=users_db,products_db,carts_db,orders_db,payments_db,notifications_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    command: python -m uvicorn services.user_service.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/users_db
      - CONSUL_URL=http://consul:8500
      - SERVICE_NAME=user-service
      - SERVICE_HOST=user-service
      - SERVICE_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-service
    command: python -m uvicorn services.product_service.app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/products_db
      - CONSUL_URL=http://consul:8500
      - SERVICE_NAME=product-service
      - SERVICE_HOST=product-service
      - SERVICE_PORT=8001
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart-service
    command: python -m uvicorn services.cart_service.app.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/carts_db
      - CONSUL_URL=http://consul:8500
      - SERVICE_NAME=cart-service
      - SERVICE_HOST=cart-service
      - SERVICE_PORT=8002
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service
    command: python -m uvicorn services.order_service.app.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/orders_db
      - CONSUL_URL=http://consul:8500
      - SERVICE_NAME=order-service
      - SERVICE_HOST=order-service
      - SERVICE_PORT=8003
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    command: python -m uvicorn services.payment_service.app.main:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/payments_db
      - CONSUL_URL=http://consul:8500
      - SERVICE_NAME=payment-service
      - SERVICE_HOST=payment-service
      - SERVICE_PORT=8004
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-service
    command: python -m uvicorn services.notification_service.app.main:app --host 0.0.0.0 --port 8005
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/notifications_db
      - CONSUL_URL=http://consul:8500
      - SERVICE_NAME=notification-service
      - SERVICE_HOST=notification-service
      - SERVICE_PORT=8005
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    command: python -m uvicorn api_gateway:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    environment:
      - CONSUL_URL=http://consul:8500
    depends_on:
      - consul
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - notification-service

volumes:
  postgres_data:
